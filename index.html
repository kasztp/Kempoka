<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Kempoka — The Chosen Ones</title>
<style>
  :root { --gold:#F5A800; --ink:#1a1a1a; }
  * { box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:#000; overflow:hidden; font-family:"Trebuchet MS",system-ui,sans-serif; touch-action:none; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:var(--ink); image-rendering:auto; width:100%; height:100%; object-fit:contain; }
  /* touch controls overlay */
  #touch { position:fixed; inset:0; display:none; pointer-events:none; z-index:10; }
  #touch.on { display:block; }
  .tbtn { position:absolute; pointer-events:auto; display:flex; align-items:center; justify-content:center;
    color:var(--gold); background:rgba(26,26,26,.55); border:2px solid rgba(245,168,0,.7);
    border-radius:50%; font-weight:bold; font-size:15px; width:64px; height:64px; }
  .tbtn:active { background:rgba(245,168,0,.35); }
  .tbtn.wide { border-radius:14px; }
  #tLeft{left:16px;bottom:24px}#tRight{left:96px;bottom:24px}
  #tUp{left:16px;bottom:104px}#tDown{left:96px;bottom:104px}
  #tPunch{right:96px;bottom:104px}#tKick{right:16px;bottom:104px}
  #tBlock{right:136px;bottom:24px}#tSpecial{right:56px;bottom:24px}#tGrab{right:16px;bottom:184px}
  /* fighter-creation form overlay (native inputs positioned over the canvas) */
  #createUI { position:fixed; inset:0; display:none; pointer-events:none; z-index:20; }
  #createUI.on { display:block; }
  /* tournament score-entry name field, same overlay mechanism as #createUI */
  #scoreUI { position:fixed; inset:0; display:none; pointer-events:none; z-index:20; }
  #scoreUI.on { display:block; }
  .cfield { position:fixed; pointer-events:auto; box-sizing:border-box; background:#20180f; color:#f2ede0;
    border:1px solid rgba(245,168,0,.6); border-radius:4px; font:13px "Trebuchet MS"; padding:0 6px; }
  input.cfield[type=color] { padding:2px; }
  input.cfield[type=range] { background:transparent; border:none; padding:0; accent-color:#F5A800; }
  select.cfield { padding:0 4px; }
  /* persistent top-right corner buttons (fullscreen toggle, exit-to-menu during a match) */
  .cornerBtn { position:fixed; top:8px; z-index:30; width:32px; height:32px; display:none;
    align-items:center; justify-content:center; color:var(--gold); background:rgba(26,26,26,.55);
    border:2px solid rgba(245,168,0,.7); border-radius:7px; font-size:15px; cursor:pointer; }
  .cornerBtn.show { display:flex; }
  .cornerBtn:active { background:rgba(245,168,0,.35); }
  #fsBtn { right:8px; }
  #exitBtn { right:46px; font-size:17px; }
  /* Cloudflare Turnstile mount point — shown only while a shared-backend write (publish a
     fighter, submit a tournament score) is in flight and needs a token; positioned per-screen
     via placeEl(), same mechanism as the .cfield inputs above. */
  #turnstileHost { position:fixed; pointer-events:auto; z-index:25; display:none; }
  #turnstileHost.on { display:block; }
</style>

<!-- Cloudflare Turnstile widget script — only used by the publish/score-entry screens (Part 3).
     Loaded async so a blocked/offline network never delays or breaks the page; if it fails to
     load, window.turnstile stays undefined and those screens simply disable shared writes. -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<script>
"use strict";
// Belt table, roster, move tables, CharacterStore, and combat math (computeDamage/fh/bodyRect/
// rectsOverlap/inClinchRange/faceDir/moveDir) all live in game-logic.js now — loaded above as a
// classic script, so GOLD/KYU_RANKS/CHARACTERS/CharacterStore/MOVES/etc. are already globals here.
// config.js (loaded first) defines window.KEMPOKA_CONFIG, consulted by SharedStore internally.
const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const W = 960, H = 540, GROUND = 476, INK = '#1a1a1a';

// `canvas{width:100%;height:100%;object-fit:contain}` means the element's box (from
// getBoundingClientRect) is often bigger than the actual rendered 960x540 content whenever the
// viewport/window isn't exactly 16:9 (any 16:10 laptop, most fullscreen monitors) — the difference
// is letterbox bars. Pointer math must use the letterboxed content rect, not the raw element box,
// or clicks land on the wrong logical coordinate (worst near edges, e.g. bottom-row menu buttons).
function canvasContentRect(){
  const r = cv.getBoundingClientRect(), boxAR = r.width/r.height, contentAR = W/H;
  let cw, ch, cx, cy;
  if(boxAR > contentAR){ ch=r.height; cw=ch*contentAR; cx=r.left+(r.width-cw)/2; cy=r.top; }
  else { cw=r.width; ch=cw/contentAR; cx=r.left; cy=r.top+(r.height-ch)/2; }
  return {left:cx, top:cy, width:cw, height:ch};
}

// ROSTER = built-ins + local custom fighters + other players' published fighters (shared,
// only present with a backend configured). Everything that lists/selects a fighter reads this
// (not CHARACTERS directly), so any of these shows up everywhere automatically, selectable as
// a CPU opponent like any built-in. A shared entry with the same id as one of your own local
// fighters (i.e. your own published fighter, read back from the server) is skipped — the local
// copy is already current and doesn't need a round trip to see.
let customCharacters=[], sharedCharacters=[], ROSTER=CHARACTERS.slice();
function refreshRoster(){
  const localIds = new Set(customCharacters.map(c=>c.id));
  ROSTER = CHARACTERS.concat(customCharacters, sharedCharacters.filter(c=>!localIds.has(c.id)));
}
CharacterStore.list().then(list=>{ customCharacters=list; refreshRoster(); });
SharedStore.listCharacters().then(list=>{ sharedCharacters=list; refreshRoster(); });

// ---------- Audio (Web Audio, no files) --------------------------------------
const Audio = (()=>{
  let ac=null, musicOn=(localStorage.kmp_music!=='0'), sfxOn=(localStorage.kmp_sfx!=='0');
  let musicTimer=null, step=0, master=null;
  const mtof = m => 440*Math.pow(2,(m-69)/12);
  function ensure(){ if(!ac){ ac=new (window.AudioContext||window.webkitAudioContext)(); master=ac.createGain(); master.gain.value=0.5; master.connect(ac.destination);} if(ac.state==='suspended') ac.resume(); }
  function env(node,g,a,d,t){ const gain=ac.createGain(); gain.gain.setValueAtTime(0,t); gain.gain.linearRampToValueAtTime(g,t+a); gain.gain.exponentialRampToValueAtTime(0.0001,t+a+d); node.connect(gain); gain.connect(master); }
  function tone(freq,type,g,a,d,t,slide){ const o=ac.createOscillator(); o.type=type; o.frequency.setValueAtTime(freq,t); if(slide) o.frequency.exponentialRampToValueAtTime(slide,t+a+d); env(o,g,a,d,t); o.start(t); o.stop(t+a+d+0.02); }
  function noise(g,dur,t,hp){ const n=Math.floor(ac.sampleRate*dur); const buf=ac.createBuffer(1,n,ac.sampleRate); const dat=buf.getChannelData(0); for(let i=0;i<n;i++) dat[i]=Math.random()*2-1; const src=ac.createBufferSource(); src.buffer=buf; const f=ac.createBiquadFilter(); f.type=hp?'highpass':'lowpass'; f.frequency.value=hp||1200; const gain=ac.createGain(); gain.gain.setValueAtTime(g,t); gain.gain.exponentialRampToValueAtTime(0.0001,t+dur); src.connect(f); f.connect(gain); gain.connect(master); src.start(t); src.stop(t+dur); }
  const SFX={
    tsuki:t=>tone(300,'square',0.18,0.005,0.08,t,140),
    geri: t=>{tone(200,'square',0.2,0.005,0.12,t,90); noise(0.12,0.08,t,1600);},
    block:t=>tone(520,'square',0.12,0.004,0.05,t),
    hit:  t=>{tone(160,'sawtooth',0.22,0.005,0.14,t,70); noise(0.18,0.09,t,2200);},
    whiff:t=>noise(0.06,0.09,t,2600),
    grab: t=>tone(240,'triangle',0.16,0.01,0.1,t,200),
    throw:t=>{noise(0.3,0.22,t,700); tone(90,'sine',0.3,0.005,0.25,t,50);},
    choke:t=>tone(120,'sawtooth',0.14,0.02,0.18,t,90),
    ko:   t=>{tone(400,'square',0.25,0.01,0.5,t,60); noise(0.3,0.4,t,1500);},
    bell: t=>{tone(880,'square',0.2,0.005,0.4,t); tone(1320,'square',0.1,0.005,0.4,t);},
    win:  t=>{[0,0.12,0.24,0.42].forEach((o,i)=>tone(mtof(64+[0,4,7,12][i]),'square',0.2,0.01,0.22,t+o));},
    click:t=>tone(660,'square',0.12,0.003,0.05,t),
  };
  function sfx(name){ if(!sfxOn) return; ensure(); const f=SFX[name]; if(f) f(ac.currentTime); }
  // ---- music: original driving montage-style chiptune loop (Em) ----
  const BASS=[40,40,47,40, 45,45,43,43, 40,40,47,52, 50,48,47,45];
  const LEAD=[null,64,null,67, null,71,72,null, null,64,null,67, 71,null,69,67];
  function playStep(){ if(!ac) return; const t=ac.currentTime+0.03; const b=BASS[step], l=LEAD[step];
    tone(mtof(b),'square',0.12,0.005,0.19,t,mtof(b));               // bass
    if(l!=null) tone(mtof(l+12),'triangle',0.09,0.01,0.2,t);        // lead
    if(step%4===0){ tone(120,'sine',0.3,0.002,0.13,t,55); }         // kick
    else noise(0.05,0.04,t,4000);                                   // hat
    step=(step+1)%16;
  }
  function startMusic(){ if(!musicOn) return; ensure(); if(musicTimer) return; step=0; playStep(); musicTimer=setInterval(playStep, (60/138/2)*1000); }
  function stopMusic(){ if(musicTimer){ clearInterval(musicTimer); musicTimer=null; } }
  return {
    sfx, startMusic, stopMusic,
    get musicOn(){return musicOn;}, get sfxOn(){return sfxOn;},
    toggleMusic(){ musicOn=!musicOn; localStorage.kmp_music=musicOn?'1':'0'; if(musicOn) startMusic(); else stopMusic(); },
    toggleSfx(){ sfxOn=!sfxOn; localStorage.kmp_sfx=sfxOn?'1':'0'; },
    ensure,
  };
})();

// ---------- Input ------------------------------------------------------------
const keys=new Set();
const KEYMAP={KeyA:1,KeyD:1,KeyW:1,KeyS:1,KeyJ:1,KeyK:1,KeyL:1,KeyU:1,KeyI:1,
  ArrowLeft:1,ArrowRight:1,ArrowUp:1,ArrowDown:1,Numpad1:1,Numpad2:1,Numpad3:1,Numpad0:1,Numpad4:1,Enter:1,Space:1};
function isFormField(e){ const tag=(e.target&&e.target.tagName)||''; return tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA'; }
addEventListener('keydown',e=>{ if(isFormField(e)) return; if(KEYMAP[e.code]) e.preventDefault(); keys.add(e.code); Audio.ensure(); });
addEventListener('keyup',e=>{ if(isFormField(e)) return; keys.delete(e.code); });
const touch={};
let touchMode = localStorage.kmp_touch || 'auto';   // 'auto' | 'on' | 'off'
let graphicsStyle = localStorage.kmp_graphics || 'classic';   // 'classic' | 'pixel'
function applyGraphicsStyle(){ cv.style.imageRendering = graphicsStyle==='pixel' ? 'pixelated' : 'auto'; }
function toggleGraphicsStyle(){ graphicsStyle = graphicsStyle==='pixel'?'classic':'pixel'; localStorage.kmp_graphics=graphicsStyle; applyGraphicsStyle(); }
applyGraphicsStyle();

// ---------- Language (menu-only setting, read live by every draw*() text call) --
// Flags are Unicode emoji (no image assets) — GOLD for English is 🇬🇧 as a neutral choice.
const FLAGS = { en:'🇬🇧', de:'🇩🇪', es:'🇪🇸', it:'🇮🇹', fr:'🇫🇷', hu:'🇭🇺' };
let lang = localStorage.kmp_lang || detectDefaultLang(navigator.languages || [navigator.language]);
let langPickerOpen = false;
function setLang(l){ lang=l; localStorage.kmp_lang=l; langPickerOpen=false; if(typeof applyLangToDom==='function') applyLangToDom(); }
function touchAuto(){ try{ return matchMedia('(pointer: coarse)').matches; }catch(e){ return ('ontouchstart' in window)||navigator.maxTouchPoints>0; } }
function wantTouch(){ return touchMode==='on' || (touchMode==='auto' && touchAuto()); }
function bindTouch(){
  document.querySelectorAll('.tbtn').forEach(el=>{
    const k=el.dataset.k;
    const on=e=>{ e.preventDefault(); touch[k]=true; Audio.ensure(); };
    const off=e=>{ e.preventDefault(); touch[k]=false; };
    el.addEventListener('pointerdown',on); el.addEventListener('pointerup',off);
    el.addEventListener('pointercancel',off); el.addEventListener('pointerleave',off);
  });
}
function readInput(side){
  if(side===0) return {
    left:keys.has('KeyA')||!!touch.left, right:keys.has('KeyD')||!!touch.right,
    up:keys.has('KeyW')||!!touch.up, down:keys.has('KeyS')||!!touch.down,
    punch:keys.has('KeyJ')||!!touch.punch, kick:keys.has('KeyK')||!!touch.kick,
    block:keys.has('KeyL')||!!touch.block, special:keys.has('KeyU')||!!touch.special,
    grab:keys.has('KeyI')||!!touch.grab };
  return {
    left:keys.has('ArrowLeft'), right:keys.has('ArrowRight'), up:keys.has('ArrowUp'), down:keys.has('ArrowDown'),
    punch:keys.has('Numpad1'), kick:keys.has('Numpad2'), block:keys.has('Numpad3'),
    special:keys.has('Numpad0'), grab:keys.has('Numpad4') };
}
// pointer clicks on canvas (menus)
let clickPt=null;
cv.addEventListener('pointerdown',e=>{ const r=canvasContentRect(); clickPt={x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H}; Audio.ensure(); });

// ---------- Fighter ----------------------------------------------------------
// computeDamage/bodyRect/rectsOverlap/inClinchRange/fh/faceDir/moveDir now live in
// game-logic.js (faceDir/moveDir take the opponent explicitly there — pass opp(f) below).
function makeFighter(char,side,x){
  return { char, side, x, y:GROUND, vx:0, vy:0, facing:side===0?1:-1,
    hp:char.stats.maxHp, wins:0, onGround:true,
    action:null, queue:[], blocking:false, crouching:false,
    cool:{special:0}, stun:0, grab:null, down:0, airThrow:false, rot:0,
    anim:0, cleaver:0, prev:{} };
}
function opp(f){ return f===F[0]?F[1]:F[0]; }

function startAction(f,move,extra){   // punch/kick allowed airborne; grab/block/throw are gated elsewhere to ground/clinch
  if(f.grab||f.down>0||f.stun>0||f.action) return false;
  f.action={ move, t:0, dur:move.dur, hit:false, ...(extra||{}) };
  f.blocking=false;
  return true;
}
function doSpecial(f,dir){
  if(f.cool.special>0 || !f.onGround) return;   // specials are ground-only (no air clinch/throw)
  if(dir) f.facing=dir;
  const t=f.char.special.type, o=opp(f);
  if(t==='cleaver'){ if(f.hp <= f.char.stats.maxHp*0.30){ f.cleaver=6; f.cool.special=3; Audio.sfx('grab'); } return; }
  f.cool.special=3;
  if(t==='combo'){ startAction(f,{...PUNCHES.neutral,dmg:6},{special:true}); f.queue=[{...PUNCHES.toward,dmg:8},{...KICKS.toward,dmg:13,knock:340}]; Audio.sfx('tsuki'); }  // jab, cross, roundhouse finisher
  else if(t==='lunge'){ if(startAction(f,{...MOVES.kick,reach:96,dmg:16,knock:380,pose:'punch'},{special:true})){ f.vx=f.facing*520; Audio.sfx('geri'); } }
  else if(t==='spin'){ if(startAction(f,{...KICKS.toward,active:[0.1,0.34],reach:92,dmg:12,knock:320},{special:true})){ f.vx=f.facing*300; Audio.sfx('geri'); } }
  else if(t==='throw'){ if(startAction(f,{...MOVES.punch,reach:70,dmg:2,pose:'punch'},{special:true,grabAttempt:true})){ f.vx=f.facing*360; Audio.sfx('grab'); } }
}

// grappling — Grab + direction: neutral=clinch, down=double-leg, back=single-leg, up=judo throw
function tryGrab(f,dir){
  if(f.grab||f.down>0||f.stun>0||f.action||!f.onGround) return;
  const o=opp(f);
  f.facing=faceDir(f,o);
  const shoot = dir==='down'||dir==='back';              // leg takedowns reach a little further
  const range = shoot?84:CLINCH_RANGE;
  const reachable = Math.abs(f.x-o.x)<range && Math.abs(f.y-o.y)<24 && !o.grab && o.down===0 && !o.airThrow;
  if(!reachable){                                         // whiff: committed recovery so it can be punished (the counter)
    f.action={ move:{active:[0,0],pose:'shoot'}, t:0, dur:0.35, hit:true }; Audio.sfx('whiff'); return;
  }
  if(dir==='down'){ takedown(f,o,10,0.9); }               // double-leg
  else if(dir==='back'){ takedown(f,o,8,0.8); }           // single-leg
  else if(dir==='up'){ doThrow(f); f.action={ move:{active:[0,0],pose:'shoot'}, t:0, dur:0.35, hit:true }; } // judo throw
  else {                                                  // neutral clinch (throw/choke follow)
    const behind = o.stun>0; // ponytail: "behind/positional" opening modeled as grabbing a stunned foe -> choke enabled
    f.grab={role:'grabber',t:0,behind,choke:0}; o.grab={role:'grabbed',t:0,behind:false,choke:0};
    o.action=null; Audio.sfx('grab');
  }
}
function takedown(f,o,dmg,downT){                          // shoot to a floored knockdown (blocking sprawls it)
  if(o.blocking){ o.hp-=computeDamage(dmg,f,o,true); Audio.sfx('block'); }
  else { o.hp-=computeDamage(dmg,f,o,false); o.down=downT; o.vx=f.facing*140; o.stun=0; Audio.sfx('throw'); }
  f.action={ move:{active:[0,0],pose:'shoot'}, t:0, dur:0.4, hit:true };
}
function endClinch(){ if(F[0].grab)F[0].grab=null; if(F[1].grab)F[1].grab=null; }
function doThrow(f){ const o=opp(f); endClinch(); o.vx=f.facing*520; o.vy=-360; o.airThrow=true; o.rot=0; o.onGround=false;
  o.hp-=computeDamage(14,f,o,false); Audio.sfx('throw'); f.x-=f.facing*30; }
function doReverse(f){ const o=opp(f); // f is grabbed, becomes grabber
  f.grab={role:'grabber',t:0,behind:false,choke:0}; o.grab={role:'grabbed',t:0,behind:false,choke:0}; Audio.sfx('grab'); }

// ---------- CPU --------------------------------------------------------------
const ai={think:0, plan:'idle'};
function aiInput(f){
  const o=opp(f), inp={left:false,right:false,up:false,down:false,punch:false,kick:false,block:false,special:false,grab:false};
  if(f.grab){ // in clinch
    if(f.grab.role==='grabber'){ if(f.grab.behind) inp.kick=true; else inp.punch=true; }
    else if(Math.random()<0.06) inp.grab=true; // sometimes counter
    return inp;
  }
  const dist=Math.abs(f.x-o.x), toward=f.x<o.x?'right':'left';
  ai.think-=DT; if(ai.think<=0){ ai.think=0.3+Math.random()*0.3;
    if(dist>150) ai.plan='approach';
    else if(o.action && Math.random()<0.5) ai.plan='block';
    else ai.plan=['punch','kick','punch','grab','approach'][Math.floor(Math.random()*5)];
  }
  if(ai.plan==='approach'){ inp[toward]=true; }
  else if(ai.plan==='block'){ inp.block=true; if(dist>110) inp[toward]=true; }
  else if(ai.plan==='grab' && dist<82){ inp.grab=true; const g=Math.random(); if(g<0.4) inp.down=true; else if(g<0.6) inp[toward==='right'?'left':'right']=true; } // sometimes double/single-leg
  else if(dist<100){ inp[ai.plan==='kick'?'kick':'punch']=true;   // add a directional modifier for variety
    const m=Math.random(); if(m<0.25) inp.down=true; else if(m<0.4) inp.up=true; else if(m<0.7) inp[toward]=true; }
  else inp[toward]=true;
  if(f.cool.special<=0 && dist<130 && Math.random()<0.02) inp.special=true;
  return inp;
}

// ---------- Update -----------------------------------------------------------
let DT=1/60;
function pressed(f,inp,key){ const p=f.prev[key]; f.prev[key]=inp[key]; return inp[key]&&!p; }
function updateFighter(f,inp){
  // face opponent when free
  const o=opp(f);
  if(!f.action && !f.grab && f.down===0) f.facing = f.x<=o.x?1:-1;
  // timers
  if(f.cool.special>0) f.cool.special-=DT;
  if(f.cleaver>0) f.cleaver-=DT;
  if(f.stun>0){ f.stun-=DT; }
  if(f.down>0){ f.down-=DT; f.vx*=0.8; }
  f.anim+=DT;

  // clinch handling
  if(f.grab){
    f.grab.t+=DT;
    // keep partners adjacent

// ---- Cloudflare Turnstile: renders a one-shot widget in #turnstileHost, positioned over
// whichever screen requested it (Create's Publish button, the tournament score-submit screen).
// Resolves to null (never rejects) when Turnstile isn't configured or its script failed to
// load (offline/blocked) — callers treat that as "can't do this write right now", not an error.
function turnstileToken(lx,ly,lw,lh){
  return new Promise(resolve=>{
    const cfg = (typeof KEMPOKA_CONFIG!=='undefined') ? KEMPOKA_CONFIG : null;
    const host = document.getElementById('turnstileHost');
    if(!cfg || !cfg.TURNSTILE_SITE_KEY || typeof turnstile==='undefined'){ resolve(null); return; }
    placeEl(host,lx,ly,lw,lh); host.innerHTML=''; host.classList.add('on');
    const done=token=>{ host.classList.remove('on'); resolve(token||null); };
    turnstile.render(host, { sitekey:cfg.TURNSTILE_SITE_KEY, callback:done, 'error-callback':()=>done(null), 'expired-callback':()=>done(null) });
  });
}

// ---- Publishing: exactly one of your local fighters may occupy the shared/public slot.
// The slot itself lives server-side (one row per anonymous account); this just remembers
// locally which fighter you last published, so the Create screen can show its status.
function publishedCharId(){ return localStorage.getItem('kmp_published_id'); }
function setPublishedCharId(id){ if(id) localStorage.setItem('kmp_published_id', id); else localStorage.removeItem('kmp_published_id'); }
let publishBusyId=null;
async function togglePublish(c){
  if(publishBusyId) return;
  publishBusyId=c.id; Audio.sfx('click');
  const alreadyPublished = publishedCharId()===c.id;
  const token = await turnstileToken(W/2-150,240,300,66);
  const ok = token && await (alreadyPublished ? SharedStore.unpublishCharacter(token) : SharedStore.publishCharacter(c, token));
  if(ok) setPublishedCharId(alreadyPublished ? null : c.id);
  publishBusyId=null;
}

  const title = (selPhase===0 || mode==='tournament') ? t(lang,'chooseYourFighter') : (mode==='1p' ? t(lang,'chooseCpuOpponent') : t(lang,'player2Choose'));
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.font='bold 30px "Trebuchet MS"'; ctx.fillText(title,W/2,58);
  hairline(74);
  const pages=Math.ceil(ROSTER.length/PER_PAGE);
  const start=page*PER_PAGE, cw=180, chh=150, gap=18, rows=Math.ceil(Math.min(PER_PAGE,ROSTER.length-start)/COLS);
  const gridW=COLS*cw+(COLS-1)*gap, x0=(W-gridW)/2, y0=110;
  for(let i=0;i<PER_PAGE;i++){ const idx=start+i; if(idx>=ROSTER.length) break;
    const col=i%COLS, row=Math.floor(i/COLS); const x=x0+col*(cw+gap), y=y0+row*(chh+gap);
    const c=ROSTER[idx]; const chosenP1 = selPhase===1 && sel[0]===idx;
    ctx.save(); ctx.fillStyle='rgba(245,168,0,.08)'; ctx.strokeStyle=chosenP1?'#888':GOLD; ctx.lineWidth=chosenP1?2:2.5;
    roundRect(x,y,cw,chh,10); ctx.fill(); ctx.stroke(); ctx.restore();
    drawPortrait(c,x+cw/2,y+chh-30,72/(132*c.build.scale));   // normalize height so tall fighters don't reach the name/belt
    ctx.fillStyle=GOLD; ctx.font='bold 18px "Trebuchet MS"'; ctx.textAlign='center'; ctx.fillText(c.name,x+cw/2,y+22);
    if(c.custom){ ctx.fillStyle='#7bdcff'; ctx.beginPath(); ctx.arc(x+cw-14,y+14,6,0,7); ctx.fill(); }   // custom-fighter badge
    // belt swatch
    const belt=getBelt(c.beltRank), sw0=x+cw/2-24, sw1=x+cw/2+24;
    ctx.fillStyle=belt?belt.color:'#3a3a3a'; ctx.fillRect(sw0,y+30,48,7);
    if(belt&&belt.stripe){ ctx.fillStyle=belt.stripe; ctx.fillRect(sw0,y+28,48,2); }
    if(belt&&belt.tip){ ctx.fillStyle=belt.tip; ctx.fillRect(sw1-8,y+30,8,7); }
    ctx.strokeStyle='#0006'; ctx.strokeRect(sw0,y+30,48,7);
    // special
    ctx.fillStyle='#e8c33a'; ctx.font='bold 12px "Trebuchet MS"'; ctx.fillText('★ '+c.special.name, x+cw/2, y+chh-8);
    buttons.push({x,y,w:cw,h:chh,fn:()=>chooseFighter(idx),label:'',active:false});
  }
  if(pages>1){ btn(x0,y0+rows*(chh+gap)+6,120,40,'◀ '+t(lang,'prev'),()=>{page=(page-1+pages)%pages;},false);
    btn(x0+gridW-120,y0+rows*(chh+gap)+6,120,40,t(lang,'next')+' ▶',()=>{page=(page+1)%pages;},false);
    ctx.fillStyle='#d8c9a0'; ctx.font='16px "Trebuchet MS"'; ctx.fillText(t(lang,'pageIndicator').replace('{a}',page+1).replace('{b}',pages),W/2,y0+rows*(chh+gap)+30); }
  if(mode==='1p' && selPhase===1) btn(W/2-100,H-52,200,38,'🎲 '+t(lang,'randomCpu'),pickRandomCpu,false);
  btn(20,H-52,110,38,'‹ '+t(lang,'back'),()=>{ if(selPhase===1){selPhase=0;} else {state='menu';} },false);
  btn(W-150,H-52,130,38,'+ '+t(lang,'create'),()=>enterCreate(),false);
  buttons.filter(b=>b.label).forEach(drawBtn);
}
function drawPortrait(c,cx,cy,scale){ const f={char:c,x:cx,y:cy,facing:1,vx:0,anim:0,cleaver:0,action:null,grab:null,down:0,stun:0,blocking:false,crouching:false,onGround:true};
  ctx.save(); ctx.translate(cx,cy); ctx.scale(scale,scale); ctx.translate(-cx,-cy); drawFighter(f); ctx.restore(); }
function chooseFighter(idx){ Audio.sfx('click');
  if(mode==='tournament'){ startTournament(idx); return; }
  if(selPhase===0){ sel[0]=idx; selPhase=1; page=0; } else { sel[1]=idx; startFight(); } }
function pickRandomCpu(){ Audio.sfx('click'); sel[1]=Math.floor(Math.random()*ROSTER.length); startFight(); }

// ---- tournament mode: beat every roster character in sequence, your own character last
// (mirror final boss). One 120s round decides each match; a win banks the remaining seconds
// and advances, a loss/draw ends the run. Score = beaten*100 + banked seconds. ----
let tournament=null;   // {active, queue:[char,...], idx, beaten, timeBank, yourChar, lastWinSide}
let tournamentResult=null;   // {score, beaten} — set once a run ends, read by the score-entry screen
function startTournament(yourIdx){
  const yourChar = ROSTER[yourIdx];
  const queue = ROSTER.filter(c=>c!==yourChar).concat([yourChar]);
  tournament = { active:true, queue, idx:0, beaten:0, timeBank:0, yourChar, lastWinSide:-1 };
  startFight();
}
function advanceTournament(){
  const youWon = tournament.lastWinSide===0;
  Audio.sfx(youWon?'win':'ko');
  if(!youWon){ finishTournament(); return; }
  tournament.timeBank += Math.ceil(Math.max(0, roundTimer));
  tournament.beaten++;
  tournament.idx++;
  if(tournament.idx>=tournament.queue.length){ finishTournament(); return; }
  startFight();
}
function finishTournament(){
  tournamentResult = { score: tournament.beaten*100 + tournament.timeBank, beaten: tournament.beaten };
  scoreNameEl.value = (tournament.yourChar && tournament.yourChar.name) || '';
  tournament.active = false;
  state = 'scoreEntry';
}

// ---- fight ----
function startFight(){ state='fight';
  stageIndex = matchCount % STAGES.length; matchCount++;   // next stage in sequence, one per fight
  const inTourney = tournament && tournament.active;
  F[0]=makeFighter(inTourney ? tournament.yourChar : ROSTER[sel[0]], 0, W*0.32);
  F[1]=makeFighter(inTourney ? tournament.queue[tournament.idx] : ROSTER[sel[1]], 1, W*0.68);
  roundTimer = inTourney ? TOURNEY_ROUND_TIME : ROUND_TIME;
  matchOver=false; koFreeze=0; introTimer=2.0; Audio.startMusic(); Audio.sfx('bell');
}
let introTimer=0;
function newRound(){ const w=[F[0].wins,F[1].wins];
  F[0]=Object.assign(makeFighter(F[0].char,0,W*0.32),{wins:w[0]});
  F[1]=Object.assign(makeFighter(F[1].char,1,W*0.68),{wins:w[1]});
  roundTimer=ROUND_TIME; koFreeze=0; Audio.sfx('bell'); }
function endRound(winSide){ koFreeze=1.4;
  if(tournament && tournament.active){ matchOver=true; tournament.lastWinSide=winSide; return; }
  if(winSide>=0){ F[winSide].wins++; }
  if(F[0].wins>=WINS_NEEDED||F[1].wins>=WINS_NEEDED){ matchOver=true; winner=F[0].wins>F[1].wins?0:1; endTimer=0; }
}
function updateFight(){
  if(koFreeze>0){ koFreeze-=DT; F.forEach(f=>{ f.anim+=DT; physics(f); });
    if(koFreeze<=0){
      if(matchOver){ if(tournament && tournament.active) advanceTournament(); else { state='result'; Audio.sfx('win'); } }
      else newRound();
    }
    return;
  }
  if(introTimer>0) introTimer-=DT;
  roundTimer-=DT;
  const in0=readInput(0), in1 = (mode==='1p'||mode==='tournament')?aiInput(F[1]):readInput(1);
  updateFighter(F[0],in0); updateFighter(F[1],in1);
  F[0].hp=Math.max(0,F[0].hp); F[1].hp=Math.max(0,F[1].hp);
  if(F[0].hp<=0||F[1].hp<=0){ endClinch(); const w=F[0].hp<=0&&F[1].hp<=0?-1:(F[1].hp<=0?0:1); Audio.sfx('ko'); endRound(w); }
  else if(roundTimer<=0){ const w=F[0].hp===F[1].hp?-1:(F[0].hp>F[1].hp?0:1); endRound(w); }
}
function drawFight(){
  bg();
  // draw back-to-front by x depth (taller/closer last is fine; keep simple)
  [F[0],F[1]].forEach(drawFighter);
  drawHUD();
  if(introTimer>0){ ctx.globalAlpha=Math.min(1,introTimer); ctx.fillStyle=GOLD; ctx.font='italic bold 30px "Trebuchet MS"'; ctx.textAlign='center';
    ctx.fillText(t(lang,STAGE_NAME_KEYS[stageIndex]),W/2,150); ctx.globalAlpha=1; }
  if(tournament && tournament.active){ ctx.fillStyle=GOLD; ctx.font='bold 13px "Trebuchet MS"'; ctx.textAlign='center';
    ctx.fillText(t(lang,'tourneyProgress').replace('{n}',tournament.idx+1).replace('{m}',tournament.queue.length),W/2,GROUND+32); }
  if(koFreeze>0){ ctx.fillStyle=GOLD; ctx.font='bold 60px "Trebuchet MS"'; ctx.textAlign='center';
    ctx.fillText(roundTimer<=0&&!(F[0].hp<=0||F[1].hp<=0)?t(lang,'time'):t(lang,'ko'),W/2,H/2); }
  // clinch prompt
  F.forEach((f,i)=>{ if(f.grab&&f.grab.role==='grabber'){ ctx.fillStyle=GOLD; ctx.font='bold 15px "Trebuchet MS"'; ctx.textAlign='center';
    ctx.fillText(f.grab.behind?t(lang,'throwChoke'):t(lang,'throwPrompt'),f.x,f.y-fh(f)-14); }
    else if(f.grab){ ctx.fillStyle='#fff'; ctx.font='bold 14px "Trebuchet MS"'; ctx.textAlign='center'; ctx.fillText(t(lang,'counter'),f.x,f.y-fh(f)-14); } });
}
const HUD_MARGIN=130;   // extra edge inset (vs. a plain 30) so the corner buttons never sit over the HP bar
const BAR_W=280;        // narrower than the old 360 so both bars leave a clear gap for the timer in the middle
function drawHUD(){
  for(let i=0;i<2;i++){ const f=F[i], right=i===1, bx=right?W-HUD_MARGIN-BAR_W:HUD_MARGIN;
    // hp bar
    ctx.fillStyle='#000'; ctx.fillRect(bx-2,16,BAR_W+4,26);
    ctx.fillStyle='#5a1414'; ctx.fillRect(bx,18,BAR_W,22);
    const frac=Math.max(0,f.hp/f.char.stats.maxHp), col = frac>0.3?'#e8b400':'#e04030';
    ctx.fillStyle=col; const wd=BAR_W*frac; ctx.fillRect(right?bx+BAR_W-wd:bx,18,wd,22);
    ctx.strokeStyle=GOLD; ctx.lineWidth=2; ctx.strokeRect(bx,18,BAR_W,22);
    ctx.fillStyle=GOLD; ctx.font='bold 18px "Trebuchet MS"'; ctx.textAlign=right?'right':'left';
    ctx.fillText(f.char.name.toUpperCase(),right?bx+BAR_W:bx,60);
    // round pips
    for(let w=0;w<WINS_NEEDED;w++){ const px=(right?bx+BAR_W-14:bx+8)+ (right?-1:1)*w*20; ctx.beginPath(); ctx.arc(px,78,6,0,7);
      ctx.fillStyle=w<f.wins?GOLD:'rgba(245,168,0,.25)'; ctx.fill(); }
    // special cd
    ctx.fillStyle='#d8c9a0'; ctx.font='12px "Trebuchet MS"'; ctx.textAlign=right?'right':'left';
    ctx.fillText(f.cleaver>0?'★ '+t(lang,'cleaverActive'): (f.cool.special>0?f.char.special.name+' '+f.cool.special.toFixed(1):f.char.special.name+' '+t(lang,'readyLabel')), right?bx+BAR_W:bx, 96);
  }
  ctx.fillStyle=GOLD; ctx.font='bold 30px "Trebuchet MS"'; ctx.textAlign='center'; ctx.fillText(Math.ceil(Math.max(0,roundTimer)),W/2,44);
}

// ---- result ----
function drawResult(){
  buttons=[]; bg2();
  const wf=F[winner];
  if(stageIndex===3){ ctx.fillStyle='rgba(245,168,0,.9)'; ctx.textAlign='center'; ctx.font='bold 56px serif'; ctx.fillText('優勝',W/2,72); } // Arena grand-stage flourish
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.font='bold 44px "Trebuchet MS"';
  ctx.fillText((mode==='2p'?(t(lang,'playerLabel')+' '+(winner+1)):(winner===0?t(lang,'youWin'):t(lang,'youLose'))),W/2,120);
  ctx.font='bold 28px "Trebuchet MS"'; ctx.fillStyle='#d8c9a0'; ctx.fillText(wf.char.name+' — '+wf.char.special.name,W/2,160);
  drawPortrait(wf.char,W/2,410,1.4);
  btn(W/2-230,470,220,50,t(lang,'rematch'),()=>startFight(),false);
  btn(W/2+10,470,220,50,t(lang,'mainMenu'),()=>{state='menu';},false);
  buttons.forEach(drawBtn);
  hairline(140);
}

// ---- tournament score entry & retro highscore list ----
let submittingScore=false;
async function submitTournamentScore(){
  if(submittingScore) return;
  submittingScore=true;
  const name=(scoreNameEl.value||'').trim().slice(0,16) || 'Player';
  const token = await turnstileToken(W/2-150,246,300,30);
  if(token) await SharedStore.submitScore({ name, score:tournamentResult.score, beaten:tournamentResult.beaten }, token);
  submittingScore=false;
  enterHighscore();
}
function drawScoreEntry(){
  buttons=[]; bg2();
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.font='bold 32px "Trebuchet MS"'; ctx.fillText(t(lang,'newHighScore'),W/2,72); hairline(88);
  ctx.font='bold 20px "Trebuchet MS"'; ctx.fillStyle='#d8c9a0';
  ctx.fillText(t(lang,'tourneyBeaten').replace('{n}',tournamentResult.beaten),W/2,140);
  ctx.fillStyle=GOLD; ctx.font='bold 26px "Trebuchet MS"'; ctx.fillText(t(lang,'tourneyScore').replace('{n}',tournamentResult.score),W/2,178);
  if(SharedStore.isConfigured()){
    ctx.fillStyle=GOLD; ctx.font='bold 13px "Trebuchet MS"'; ctx.fillText(t(lang,'nameFieldLabel'),W/2,224);
    placeEl(scoreNameEl,W/2-150,230,300,30);
    btn(W/2-150,286,300,46, submittingScore?'…':t(lang,'submitScore'), submitTournamentScore, false);
    btn(W/2-150,342,300,38, t(lang,'skip'), enterHighscore, false);
  } else {
    btn(W/2-150,286,300,46, t(lang,'mainMenu'), ()=>{state='menu';}, false);
  }
  buttons.forEach(drawBtn);
}

let highscoreList=[], highscoreLoading=false;
function enterHighscore(){ state='highscore'; highscoreLoading=true;
  SharedStore.topScores(20).then(list=>{ highscoreList=list; highscoreLoading=false; }); }
function drawHighscore(){
  buttons=[]; bg2();
  ctx.fillStyle=GOLD; ctx.textAlign='center'; ctx.font='bold 30px "Trebuchet MS"'; ctx.fillText(t(lang,'highScores'),W/2,58); hairline(74);
  ctx.font='bold 13px "Trebuchet MS"'; ctx.fillStyle='#8a7d5c'; ctx.textAlign='left';
  ctx.fillText(t(lang,'rankHeader'),W/2-260,94); ctx.fillText(t(lang,'nameFieldLabel'),W/2-190,94);
  ctx.textAlign='right'; ctx.fillText(t(lang,'scoreHeader'),W/2+260,94);
  hairline(102);
  if(highscoreLoading || !highscoreList.length){
    ctx.textAlign='center'; ctx.fillStyle='#8a7d5c'; ctx.font='14px "Trebuchet MS"';
    ctx.fillText(highscoreLoading?'…':t(lang,'noScoresYet'),W/2,220);
  } else {
    highscoreList.forEach((s,i)=>{ const y=132+i*20;
      ctx.fillStyle = i<3?GOLD:'#e6dcc0'; ctx.font='bold 14px "Trebuchet MS"';
      ctx.textAlign='left'; ctx.fillText('#'+(i+1),W/2-260,y); ctx.fillText(s.name,W/2-190,y);
      ctx.textAlign='right'; ctx.fillText(String(s.score),W/2+260,y);
    });
  }
  btn(W/2-110,H-56,220,40,'‹ '+t(lang,'mainMenu'),()=>{state='menu';},false);
  buttons.forEach(drawBtn);
}

// ---------- Loop -------------------------------------------------------------
function handleClick(){ if(!clickPt) return; const p=clickPt; clickPt=null;
  if(state==='fight') return;
  for(const b of buttons){ if(b.fn && hit(b,p)){ b.fn(); return; } } }
let last=performance.now();
function loop(now){ DT=Math.min(0.05,(now-last)/1000); last=now;
  handleClick();
  if(state==='menu') drawMenu();
  else if(state==='controls') drawControls();
  else if(state==='create') drawCreate();
  else if(state==='select') drawSelect();
  else if(state==='fight'){ updateFight(); drawFight(); }
  else if(state==='result') drawResult();
  else if(state==='scoreEntry') drawScoreEntry();
  else if(state==='highscore') drawHighscore();
  // on-screen pad: only where it's usable (a live fight) or being previewed on the controls screen
  document.getElementById('touch').classList.toggle('on', wantTouch() && (state==='fight'||state==='controls'));
  document.getElementById('createUI').classList.toggle('on', state==='create');
  document.getElementById('scoreUI').classList.toggle('on', state==='scoreEntry' && SharedStore.isConfigured());
  document.getElementById('exitBtn').classList.toggle('show', state==='fight');
  requestAnimationFrame(loop);
}
document.getElementById('exitBtn').addEventListener('pointerdown', e=>{ e.preventDefault(); state='menu'; });
// ---------- Fullscreen toggle (persistent button, independent of game state) --
// ponytail: element Fullscreen isn't supported on iPhone Safari (iPadOS/desktop/Android are fine)
// — feature-detect and just hide the button there rather than show a control that silently no-ops.
(function initFullscreen(){
  const btn = document.getElementById('fsBtn');
  const canFullscreen = document.documentElement.requestFullscreen || document.documentElement.webkitRequestFullscreen;
  if(!canFullscreen){ return; }
  btn.classList.add('show');
  function isFs(){ return !!(document.fullscreenElement || document.webkitFullscreenElement); }
  function updateIcon(){ btn.textContent = isFs() ? '⤫' : '⛶'; btn.title = isFs() ? 'Exit fullscreen' : 'Fullscreen'; }
  btn.addEventListener('pointerdown', e=>{
    e.preventDefault();
    if(isFs()){ (document.exitFullscreen||document.webkitExitFullscreen).call(document); }
    else{ const el=document.documentElement; (el.requestFullscreen||el.webkitRequestFullscreen).call(el); }
  });
  document.addEventListener('fullscreenchange', updateIcon);
  document.addEventListener('webkitfullscreenchange', updateIcon);
  updateIcon();
})();

bindTouch();
requestAnimationFrame(loop);

// ---------- Self-check (?test=1) ---------------------------------------------
function runSelfCheck(){
  const a=makeFighter(CHARACTERS[0],0,300), b=makeFighter(CHARACTERS[1],1,600);
  const noBlk=computeDamage(10,a,b,false), blk=computeDamage(10,a,b,true);
  const ok1 = blk < noBlk;
  const ok2 = rectsOverlap({x0:0,x1:10,y0:0,y1:10},{x0:5,x1:15,y0:5,y1:15}) && !rectsOverlap({x0:0,x1:5,y0:0,y1:5},{x0:6,x1:9,y0:6,y1:9});
  b.x=a.x+300; const ok3 = !inClinchRange(a,b); b.x=a.x+40; const ok4=inClinchRange(a,b);
  // directional move selection: opponent to the right, so holding right = toward, left = back
  a.x=100; b.x=500;   // moveDir/faceDir now take the opponent explicitly — no global F needed
  const ok5 = moveDir(a,b,{up:true})==='up' && moveDir(a,b,{down:true})==='down'
           && moveDir(a,b,{right:true})==='toward' && moveDir(a,b,{left:true})==='back' && moveDir(a,b,{})==='neutral';
  const ok6 = KICKS.up.name==='Head kick' && PUNCHES.up.launch<0;   // tables wired
  const ok7 = ROSTER.length>=CHARACTERS.length && ROSTER[0]===CHARACTERS[0];   // roster combiner sane
  const pass=ok1&&ok2&&ok3&&ok4&&ok5&&ok6&&ok7;
  console.assert(ok1,'block should reduce damage'); console.assert(ok2,'rect overlap'); console.assert(ok3,'grab fails at range'); console.assert(ok4,'grab works in range');
  console.assert(ok5,'moveDir maps directions'); console.assert(ok6,'move tables wired'); console.assert(ok7,'ROSTER combines CHARACTERS + custom');
  const el=document.createElement('div'); el.style.cssText='position:fixed;top:8px;left:8px;z-index:99;font:bold 16px monospace;padding:8px 12px;border-radius:6px;color:#000;background:'+(pass?'#3c3':'#f44');
  el.textContent='SELF-CHECK '+(pass?'PASS':'FAIL'); document.body.appendChild(el);
  // async: verify the CharacterStore round-trips (save -> list -> remove), the actual persistence contract
  const testId='selftest_'+Math.random().toString(36).slice(2);
  CharacterStore.save({id:testId,name:'Test'}).then(()=>CharacterStore.list()).then(list=>{
    const found=list.some(c=>c.id===testId);
    return CharacterStore.remove(testId).then(()=>found);
  }).then(storeOk=>{
    const el2=document.createElement('div'); el2.style.cssText='position:fixed;top:40px;left:8px;z-index:99;font:bold 14px monospace;padding:6px 10px;border-radius:6px;color:#000;background:'+(storeOk?'#3c3':'#f44');
    el2.textContent='STORE '+(storeOk?'OK':'FAIL'); document.body.appendChild(el2);
  });
  return pass;
}
if(new URLSearchParams(location.search).get('test')==='1') runSelfCheck();
</script>
